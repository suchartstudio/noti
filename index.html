<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมอ่านข้อความภาษาไทย (Thai Text-to-Speech)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            color: #1a73e8;
        }
        .warning-note {
            text-align: center;
            font-size: 13px;
            color: #e53935;
            margin-bottom: 20px;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus, textarea:focus {
            border-color: #1a73e8;
        }
        textarea {
            height: 200px;
            resize: vertical;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-family: 'Prompt', sans-serif;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-play {
            background-color: #1a73e8;
            color: white;
        }
        .btn-play:hover {
            background-color: #1557b0;
        }
        .btn-stop {
            background-color: #e53935;
            color: white;
        }
        .btn-stop:hover {
            background-color: #b71c1c;
        }
        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ อ่านข้อความภาษาไทย</h1>

        <div class="form-group">
            <label for="voiceSelect">เลือกเสียง (ถ้าไม่ขึ้นให้เลือก ระบบจะใช้เสียงพื้นฐาน):</label>
            <select id="voiceSelect">
                <option value="">กำลังโหลดเสียง หรือใช้เสียงพื้นฐานของระบบ...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="textInput">พิมพ์ข้อความที่ต้องการให้อ่าน:</label>
            <textarea id="textInput" placeholder="สวัสดีครับ ยินดีต้อนรับสู่โปรแกรมอ่านข้อความ..."></textarea>
        </div>

        <div class="controls">
            <button class="btn-play" id="playBtn">▶️ เล่นเสียง</button>
            <button class="btn-stop" id="stopBtn">⏹️ หยุด</button>
        </div>
        
        <div class="status" id="statusText">พร้อมใช้งาน</div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');

        let voices = [];
        let isIOSUnlocked = false; // ตัวแปรเช็คว่าปลดล็อคเสียงบน iOS หรือยัง

        // ฟังก์ชันโหลดรายชื่อเสียง
        function populateVoiceList() {
            voices = synth.getVoices();
            const thaiVoices = voices.filter(voice => voice.lang.includes('th'));
            
            voiceSelect.innerHTML = '';

            if (thaiVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = 'ใช้เสียงภาษาไทยเริ่มต้นของระบบ';
                option.value = 'default';
                voiceSelect.appendChild(option);
                return;
            }

            thaiVoices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name}`;
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }

        // โหลดเสียงเมื่อเปิดเว็บ และเมื่อ API พร้อม (แก้ปัญหา Safari โหลดช้า)
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // ฟังก์ชันเล่นเสียง
        playBtn.addEventListener('click', () => {
            // ปลดล็อค Audio Context สำหรับ iOS เมื่อมีการคลิกครั้งแรก
            if (!isIOSUnlocked) {
                const unlockUtterance = new SpeechSynthesisUtterance('');
                synth.speak(unlockUtterance);
                isIOSUnlocked = true;
            }

            // ถ้าระบบกำลังพูดอยู่ให้หยุดก่อน ป้องกันการค้างบนมือถือบางรุ่น
            if (synth.speaking) {
                synth.cancel(); 
                // เพิ่ม delay เล็กน้อยสำหรับ iOS Safari เพื่อให้ cancel ทำงานเสร็จก่อน
                setTimeout(() => startSpeaking(), 100);
            } else {
                startSpeaking();
            }
        });

        function startSpeaking() {
            const text = textInput.value.trim();
            if (text !== '') {
                const utterThis = new SpeechSynthesisUtterance(text);
                
                // บังคับให้เป็นภาษาไทยเสมอ (สำคัญมากสำหรับ iOS Fallback)
                utterThis.lang = 'th-TH'; 
                
                // ค้นหาเสียงที่ผู้ใช้เลือก (ถ้ามี)
                if (voiceSelect.selectedOptions[0] && voiceSelect.selectedOptions[0].value !== 'default') {
                    const selectedVoiceName = voiceSelect.selectedOptions[0].getAttribute('data-name');
                    const selectedVoice = voices.find(voice => voice.name === selectedVoiceName);
                    if (selectedVoice) {
                        utterThis.voice = selectedVoice;
                    }
                }
                
                utterThis.rate = 1.0; 
                utterThis.pitch = 1.0;

                // Event Listeners
                utterThis.onstart = () => { statusText.textContent = '🔊 กำลังอ่านข้อความ...'; };
                utterThis.onend = () => { statusText.textContent = 'พร้อมใช้งาน'; };
                utterThis.onerror = (e) => { 
                    console.error('TTS Error:', e);
                    statusText.textContent = '❌ เกิดข้อผิดพลาด/ถูกขัดจังหวะ'; 
                };

                synth.speak(utterThis);
            } else {
                statusText.textContent = '⚠️ กรุณาพิมพ์ข้อความก่อนกดเล่นเสียง';
            }
        }

        // ฟังก์ชันหยุดเสียง
        stopBtn.addEventListener('click', () => {
            if (synth.speaking || synth.pending) {
                synth.cancel();
                statusText.textContent = 'หยุดการอ่านข้อความแล้ว';
            }
        });
    </script>
</body>
</html>
