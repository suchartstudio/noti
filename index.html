<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมอ่านข้อความภาษาไทย (Thai Text-to-Speech)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px; /* ขนาดกำลังดีสำหรับหน้าจอ Notebook */
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #1a73e8;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus, textarea:focus {
            border-color: #1a73e8;
        }
        textarea {
            height: 200px;
            resize: vertical;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-family: 'Prompt', sans-serif;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-play {
            background-color: #1a73e8;
            color: white;
        }
        .btn-play:hover {
            background-color: #1557b0;
        }
        .btn-stop {
            background-color: #e53935;
            color: white;
        }
        .btn-stop:hover {
            background-color: #b71c1c;
        }
        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ อ่านข้อความภาษาไทย</h1>
        
        <div class="form-group">
            <label for="voiceSelect">เลือกเสียง (ชาย/หญิง ขึ้นอยู่กับอุปกรณ์ของคุณ):</label>
            <select id="voiceSelect">
                <option value="">กำลังโหลดเสียง...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="textInput">พิมพ์ข้อความที่ต้องการให้อ่าน:</label>
            <textarea id="textInput" placeholder="สวัสดีครับ ยินดีต้อนรับสู่โปรแกรมอ่านข้อความ..."></textarea>
        </div>

        <div class="controls">
            <button class="btn-play" id="playBtn">▶️ เล่นเสียง</button>
            <button class="btn-stop" id="stopBtn">⏹️ หยุด</button>
        </div>
        
        <div class="status" id="statusText">พร้อมใช้งาน</div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');

        let voices = [];

        // ฟังก์ชันโหลดรายชื่อเสียง
        function populateVoiceList() {
            voices = synth.getVoices();
            
            // กรองเอาเฉพาะเสียงที่รองรับภาษาไทย
            const thaiVoices = voices.filter(voice => voice.lang.includes('th'));
            
            voiceSelect.innerHTML = '';

            if (thaiVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = 'ไม่พบเสียงภาษาไทยบนอุปกรณ์/เบราว์เซอร์นี้';
                voiceSelect.appendChild(option);
                return;
            }

            thaiVoices.forEach((voice) => {
                const option = document.createElement('option');
                // แสดงชื่อเสียง (มักจะบอกใบ้ว่าเป็นชายหรือหญิง เช่น Kanya, Pattara)
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }

        // โหลดเสียงเมื่อ API พร้อม
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // ฟังก์ชันเล่นเสียง
        playBtn.addEventListener('click', () => {
            if (synth.speaking) {
                synth.cancel(); // หยุดเสียงเก่าก่อนถ้ากำลังพูดอยู่
            }

            const text = textInput.value.trim();
            if (text !== '') {
                const utterThis = new SpeechSynthesisUtterance(text);
                
                // ค้นหาเสียงที่ผู้ใช้เลือกจาก Dropdown
                const selectedVoiceName = voiceSelect.selectedOptions[0].getAttribute('data-name');
                const selectedVoice = voices.find(voice => voice.name === selectedVoiceName);
                
                if (selectedVoice) {
                    utterThis.voice = selectedVoice;
                }
                
                utterThis.lang = 'th-TH';
                
                // กำหนดความเร็วและระดับเสียงได้ (0.1 ถึง 2)
                utterThis.rate = 1.0; 
                utterThis.pitch = 1.0;

                // Event Listeners สำหรับสถานะ
                utterThis.onstart = () => { statusText.textContent = '🔊 กำลังอ่านข้อความ...'; };
                utterThis.onend = () => { statusText.textContent = 'พร้อมใช้งาน'; };
                utterThis.onerror = () => { statusText.textContent = '❌ เกิดข้อผิดพลาดในการเล่นเสียง'; };

                synth.speak(utterThis);
            } else {
                statusText.textContent = '⚠️ กรุณาพิมพ์ข้อความก่อนกดเล่นเสียง';
            }
        });

        // ฟังก์ชันหยุดเสียง
        stopBtn.addEventListener('click', () => {
            if (synth.speaking) {
                synth.cancel();
                statusText.textContent = 'พร้อมใช้งาน';
            }
        });
    </script>
</body>
</html>
